<!DOCTYPE html>
<html>

  <head>
    <meta charset='utf-8' />
    <title>University of Oregon Mapping</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <!--    Include the reference to the Mapbox JavaScript here in the <head> of the page  (Part I.1)  -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>


          
    <!--    Include the reference to the Mapbox CSS here in between <head> tags    (Part I.2) -->
     <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">

    <style>
        /* Insert the additional CSS code here between the <style> tags  (Part I.4)   */
          body { margin:0; padding:0; }
     #map { position:absolute; top:0; bottom:0; width:100%; }
     #banner { z-index: 9999; 
         background-color:rgb(114, 156, 138); 
         opacity: 80%; 
         text-align: center 
     }

    </style>
  </head>

  <body>
    <!--  Insert the map div here in the <body> of the page  (Part I)  -->
    <div id='map'></div>
    <!--  Insert the title div here (part VI) -->
     <div id='banner'> 
     		<h1>My Map of Portland</h1>
     		<h2>By: Hannah Grauel</h2>
 	</div>    
    <script>
        // Insert the JavaScript within the <script> tags, within the body   
        // Start with the Mapbox access token here (Part 2.1)
  mapboxgl.accessToken = 'pk.eyJ1IjoiaGFubmFoZ3JhdWVsIiwiYSI6ImNtbmdhdDZsNDA3YjQyb3BuYWp4YXhwN3MifQ.9yvApYYp21zy-VJO6DJIDQ';
   
        // Then initialize the map here (Part 2.2)
var map = new mapboxgl.Map({
     container: 'map', // id of a div on your page, where the map will be inserted
     style: 'mapbox://styles/mapbox/satellite-streets-v12', // stylesheet location
     center: [-122.6788, 45.5212], // starting position [lng, lat] eg. [-122.6788, 45.5212]
     zoom: 11 // starting zoom 
 });
        // Add the zoom contols here (part V)
 map.addControl(new mapboxgl.NavigationControl({
     showCompass: false
 }), 'bottom-left');
        // Add popups for markers here. Yes, before the markers!  (part IV)
var popup = new mapboxgl.Popup({ offset: 25 })
     .setHTML('Hello World. Welcome to Portland!');

        // Add any other variables such as markers here (part III)
var marker = new mapboxgl.Marker({color:'#6A17FF'})
   .setLngLat([-122.7071, 45.5185]) // starting position [lng, lat] 
   .addTo(map);

    var marker = new mapboxgl.Marker({color:'green'})
     .setLngLat([-122.6788, 45.5212])
     .setPopup(popup) //add the popup with the variable name 'popup' to this marker 
     .addTo(map); // add the open marker to the map

 var popup_layer_voodoo = new mapboxgl.Popup({
       closeOnClick: false, anchor: 'top-left'
     })
     .setLngLat([-122.7071, 45.5185])
     .setHTML('<a href="https://www.oregonzoo.org/wildlife/animals">ZOO!!</a>')
     .addTo(map);
        // Add optional advanced "On load" function here
        
    </script>

  </body>

</html>
